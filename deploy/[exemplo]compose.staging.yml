services:
  rabbitmq:
    ports: ["5673:5672", "15673:15672"]

  bff:
    image: ${DOCKERHUB_USER:?}/moope-bff-staging:${BFF_TAG:-latest}
    ports: ["6100:8080"]
    environment:
      - ASPNETCORE_ENVIRONMENT=Staging

  auth:
    image: ${DOCKERHUB_USER:?}/moope-auth-staging:${AUTH_TAG:-latest}
    ports: ["6101:8080"]
    environment:
      - ASPNETCORE_ENVIRONMENT=Staging

  cliente:
    image: ${DOCKERHUB_USER:?}/moope-cliente-staging:${CLIENTE_TAG:-latest}
    ports: ["6102:8080"]
    environment:
      - ASPNETCORE_ENVIRONMENT=Staging

  comodato:
    image: ${DOCKERHUB_USER:?}/moope-comodato-staging:${COMODATO_TAG:-latest}
    ports: ["6103:8080"]
    environment:
      - ASPNETCORE_ENVIRONMENT=Staging

  email:
    image: ${DOCKERHUB_USER:?}/moope-email-staging:${EMAIL_TAG:-latest}
    ports: ["6104:8080"]
    environment:
      - ASPNETCORE_ENVIRONMENT=Staging

  endereco:
    image: ${DOCKERHUB_USER:?}/moope-endereco-staging:${ENDERECO_TAG:-latest}
    ports: ["6105:8080"]
    environment:
      - ASPNETCORE_ENVIRONMENT=Staging

  pagamento:
    image: ${DOCKERHUB_USER:?}/moope-pagamento-staging:${PAGAMENTO_TAG:-latest}
    ports: ["6106:8080"]
    environment:
      - ASPNETCORE_ENVIRONMENT=Staging

  pedido:
    image: ${DOCKERHUB_USER:?}/moope-pedido-staging:${PEDIDO_TAG:-latest}
    ports: ["6107:8080"]
    environment:
      - ASPNETCORE_ENVIRONMENT=Staging
      - PlanoApi__BaseUrl=http://plano:8080

  plano:
    image: ${DOCKERHUB_USER:?}/moope-plano-staging:${PLANO_TAG:-latest}
    ports: ["6108:8080"]
    environment:
      - ASPNETCORE_ENVIRONMENT=Staging

  vendedor:
    image: ${DOCKERHUB_USER:?}/moope-vendedor-staging:${VENDEDOR_TAG:-latest}
    ports: ["6109:8080"]
    environment:
      - ASPNETCORE_ENVIRONMENT=Staging

  rabbitmq-worker:
    image: ${DOCKERHUB_USER:?}/moope-rabbitmq-worker-staging:${RABBITMQ_WORKER_TAG:-latest}
    environment:
      - DOTNET_ENVIRONMENT=Staging
      - ASPNETCORE_ENVIRONMENT=Staging
      - RabbitMQ__HostName=${RABBITMQ_HOST:-147.93.70.24}
      - RabbitMQ__Port=${RABBITMQ_PORT:-5673}
      - RabbitMQ__UserName=${RABBITMQ_USER:-hml-administrador}
      - RabbitMQ__Password=${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      - RabbitMQ__VirtualHost=${RABBITMQ_VHOST:-/}
      - DownstreamApis__Auth=https://auth-staging-compre.moope.com.br
      - DownstreamApis__Pedido=https://pedido-staging-compre.moope.com.br
      - DownstreamApis__Pagamento=https://pagamento-staging-compre.moope.com.br
      - DownstreamApis__Cliente=https://cliente-staging-compre.moope.com.br
      - DownstreamApis__Endereco=https://endereco-staging-compre.moope.com.br
      - DownstreamApis__Plano=https://plano-staging-compre.moope.com.br
      - DownstreamApis__Vendedor=https://vendedor-staging-compre.moope.com.br
      - DownstreamApis__AuthClientId=${RABBITMQ_WORKER_AUTH_CLIENT_ID:?RABBITMQ_WORKER_AUTH_CLIENT_ID is required}
      - DownstreamApis__AuthClientSecret=${RABBITMQ_WORKER_AUTH_CLIENT_SECRET:?RABBITMQ_WORKER_AUTH_CLIENT_SECRET is required}
      - DownstreamApis__ClienteApiKey=${RABBITMQ_WORKER_CLIENTE_API_KEY:?RABBITMQ_WORKER_CLIENTE_API_KEY is required}
    depends_on:
      - rabbitmq
      - auth
      - pedido
      - pagamento
      - cliente
